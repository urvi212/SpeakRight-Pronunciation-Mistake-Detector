<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SpeakRight</title>
     <!-- ✅ Font Awesome for mic icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="header">
        <div class="logo"><span class="highlight">Speak</span>Right</div>
    </div>

    <main>
        <div class="intro">
            <h1>🎙 Record your pronunciation and get feedback!</h1>
        </div>

        <div id="input-section">
            <input type="text" id="word-input" placeholder="Enter a word to pronounce..." />
            <button id="speak-btn"><i class="fas fa-volume-up"></i></button>
        </div>

        <div id="recording-section">
            <button id="record-btn"><i class="fas fa-microphone"></i></button>
        </div>
        <div id="record-status"></div>

        <div id="accuracy-progress">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div id="accuracy-score">Accuracy: --%</div>
        </div>

        <div id="feedback-section">
            <p id="feedback-message">💬 Feedback will appear here after recording.</p>
        </div>
    </main>

    <footer>
        &copy; 2025 SpeakRight. All rights reserved.
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
